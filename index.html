<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IPL Live Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .highlight {
      color: #38bdf8;
      font-weight: bold;
    }

    #status {
      text-align: center;
      margin-bottom: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>🏏 IPL Live Match Dashboard</h1>

<div id="status">⏳ Connecting...</div>
<div id="content"></div>

<script>
  const API_URL = "https://a-bhavy-bot-bbheroku-5f1b58e25c41.herokuapp.com/data";

  async function fetchData() {
    try {
      const res = await fetch(API_URL);

      // ✅ Check response status
      if (!res.ok) {
        throw new Error("Server error: " + res.status);
      }

      const data = await res.json();

      document.getElementById("status").innerText =
        "✅ Updated at " + new Date().toLocaleTimeString();

      renderData(data);

    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText =
        "❌ Error fetching data (retrying...)";
    }
  }

  function renderData(data) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    if (!data || !data.data) {
      container.innerHTML = "<p>No data yet...</p>";
      return;
    }

    const innings = data.data;

    for (let key in innings) {
      const inn = innings[key];

      const card = document.createElement("div");
      card.className = "card";

      const team =
        inn?.Innings1?.BattingTeamName ||
        inn?.BattingTeamName ||
        "Unknown Team";

      const score =
        inn?.Innings1?.TotalRuns ??
        inn?.TotalRuns ??
        0;

      const wickets =
        inn?.Innings1?.Wickets ??
        inn?.Wickets ??
        0;

      const overs =
        inn?.Innings1?.Overs ??
        inn?.Overs ??
        "0.0";

      card.innerHTML = `
        <h2>${key.toUpperCase()}</h2>
        <p class="highlight">Team: ${team}</p>
        <p>Score: ${score}/${wickets}</p>
        <p>Overs: ${overs}</p>
      `;

      container.appendChild(card);
    }
  }

  // ✅ Smart polling (NO overlapping requests)
  async function startFetching() {
    while (true) {
      await fetchData(); // wait until complete
      await new Promise(r => setTimeout(r, 5000)); // 5 sec delay
    }
  }

  startFetching();
</script>

</body>
</html>
